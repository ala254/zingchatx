<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ZingChatX</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        margin: 0 4px;
        border-radius: 50%;
        background: #ff2d55;
        display: inline-block;
        animation: b 1s infinite ease-in-out both;
      }
      .dot:nth-child(2) { animation-delay: 0.15s; }
      .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes b {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!--
      This shell is only used at `npx cap sync` time to satisfy Capacitor's
      webDir requirement. At runtime the native app loads the deployed
      TanStack Start SSR site via `server.url` in capacitor.config.ts, so
      this file is never actually shown once the WebView connects.
    -->
    <div>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </body>
</html>
